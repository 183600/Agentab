<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrome Agent</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">🤖</div>
        <h1>Chrome Agent</h1>
      </div>
      <div class="header-right">
        <button id="btn-tasks" class="icon-btn" title="Saved Tasks">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            <path d="M9 14l2 2 4-4"/>
          </svg>
        </button>
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="tabs">
      <button class="tab active" data-tab="prompt">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        Prompt
      </button>
      <button class="tab" data-tab="code">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
        </svg>
        Code
      </button>
    </nav>

    <!-- Prompt Tab -->
    <div id="tab-prompt" class="tab-content active">
      <div class="input-section">
        <textarea id="prompt-input" placeholder="Describe what you want the agent to do...&#10;&#10;Examples:&#10;• Find all images on this page and list their URLs&#10;• Fill the search form with 'chrome extensions' and submit&#10;• Extract all email addresses from this page&#10;• Scroll to the bottom and count all links" rows="5"></textarea>
        <div class="input-actions">
          <button id="btn-save-prompt" class="btn btn-secondary" title="Save as Task">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
            </svg>
            Save
          </button>
          <button id="btn-run-prompt" class="btn btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            Run Agent
          </button>
        </div>
      </div>
    </div>

    <!-- Code Tab -->
    <div id="tab-code" class="tab-content">
      <div class="input-section">
        <textarea id="code-input" placeholder="Enter JavaScript code to execute...&#10;&#10;// Available helpers:&#10;// __chromeAgent.waitForElement(selector)&#10;// __chromeAgent.typeText(selector, text)&#10;// __chromeAgent.clickElement(selector)&#10;// __chromeAgent.sleep(ms)&#10;// __chromeAgent.extractTable(selector)&#10;// __chromeAgent.fillForm({selector: value})" rows="8" spellcheck="false" class="code-textarea"></textarea>
        <div class="input-actions">
          <button id="btn-save-code" class="btn btn-secondary" title="Save as Task">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
            </svg>
            Save
          </button>
          <button id="btn-run-code" class="btn btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            Execute
          </button>
        </div>
      </div>
    </div>

    <!-- Output Section -->
    <div id="output-section" class="output-section hidden">
      <div class="output-header">
        <h3>Output</h3>
        <button id="btn-clear-output" class="icon-btn small" title="Clear">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="output-content" class="output-content"></div>
    </div>

    <!-- Settings Panel (hidden by default) -->
    <div id="settings-panel" class="panel hidden">
      <div class="panel-header">
        <h3>Settings</h3>
        <button class="icon-btn small close-panel" data-panel="settings-panel">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="panel-body">
        <div class="form-group">
          <label for="api-base-url">API Base URL</label>
          <input type="url" id="api-base-url" placeholder="https://api.openai.com/v1">
        </div>
        <div class="form-group">
          <label for="api-key">API Key</label>
          <input type="password" id="api-key" placeholder="sk-...">
        </div>
        <div class="form-group">
          <label for="model">Model</label>
          <input type="text" id="model" placeholder="gpt-4">
        </div>
        <button id="btn-save-settings" class="btn btn-primary full-width">Save Settings</button>
      </div>
    </div>

    <!-- Save Task Dialog -->
    <div id="save-dialog" class="dialog-overlay hidden">
      <div class="dialog">
        <div class="dialog-header">
          <h3>Save Task</h3>
          <button class="icon-btn small" id="btn-close-save-dialog">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="dialog-body">
          <div class="form-group">
            <label for="task-name">Task Name *</label>
            <input type="text" id="task-name" placeholder="My Task">
          </div>
          <div class="form-group">
            <label for="task-description">Description (optional)</label>
            <input type="text" id="task-description" placeholder="What this task does...">
          </div>
          <div class="form-group">
            <label>Type</label>
            <div class="task-type-badge" id="task-type-badge">prompt</div>
          </div>
          <div class="form-group">
            <label>Content Preview</label>
            <pre id="task-content-preview" class="content-preview"></pre>
          </div>
        </div>
        <div class="dialog-footer">
          <button class="btn btn-secondary" id="btn-cancel-save">Cancel</button>
          <button class="btn btn-primary" id="btn-confirm-save">Save Task</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
