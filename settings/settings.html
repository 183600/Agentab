<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="settingsPageTitle">Agentab - 设置</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="page-header">
      <div class="header-content">
        <div class="header-left">
          <div>
            <h1 data-i18n="settingsTitle">设置</h1>
          </div>
        </div>
      </div>
    </header>

    <!-- Settings Content -->
    <div class="settings-content">
      <!-- API Configuration -->
      <section class="settings-section">
        <h2 class="section-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <span data-i18n="apiConfigTitle">API 配置</span>
        </h2>
        <div class="form-group">
          <label for="api-base-url" data-i18n="apiBaseUrlLabel">API 地址</label>
          <input type="url" id="api-base-url" data-i18n-placeholder="apiBaseUrlPlaceholder">
          <p class="hint" data-i18n="apiBaseUrlHint">OpenAI 兼容 API 的基础地址</p>
        </div>
        <div class="form-group">
          <label for="api-key" data-i18n="apiKeyLabel">API 密钥</label>
          <div class="input-with-toggle">
            <input type="password" id="api-key" data-i18n-placeholder="apiKeyPlaceholder">
            <button class="toggle-visibility" id="toggle-api-key" type="button">
              <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-off-icon hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.93 10.93 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="model" data-i18n="modelLabel">模型</label>
          <input type="text" id="model" data-i18n-placeholder="modelPlaceholder">
          <p class="hint" data-i18n="modelHint">要使用的模型名称，如 gpt-4、gpt-3.5-turbo</p>
        </div>
      </section>

      <!-- Actions -->
      <div class="settings-actions">
        <button id="btn-save-settings" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          <span data-i18n="btnSaveSettings">保存设置</span>
        </button>
        <button id="btn-test-connection" class="btn btn-secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <span data-i18n="btnTestConnection">测试连接</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="../lib/i18n.js"></script>
  <script src="settings.js"></script>
</body>
</html>
