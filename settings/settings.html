<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="settingsPageTitle">Agentab - 设置</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="page-header">
      <div class="header-content">
        <div class="header-left">
          <div>
            <h1 data-i18n="settingsTitle">设置</h1>
          </div>
        </div>
      </div>
    </header>

    <!-- Settings Content -->
    <div class="settings-content">
      <!-- API Configuration -->
      <section class="settings-section">
        <h2 class="section-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <span data-i18n="apiConfigTitle">API 配置</span>
        </h2>
        <div class="form-group">
          <label for="api-base-url" data-i18n="apiBaseUrlLabel">API 地址</label>
          <input type="url" id="api-base-url" data-i18n-placeholder="apiBaseUrlPlaceholder">
          <p class="hint" data-i18n="apiBaseUrlHint">OpenAI 兼容 API 的基础地址</p>
        </div>
        <div class="form-group">
          <label for="api-key" data-i18n="apiKeyLabel">API 密钥</label>
          <div class="input-with-toggle">
            <input type="password" id="api-key" data-i18n-placeholder="apiKeyPlaceholder">
            <button class="toggle-visibility" id="toggle-api-key" type="button">
              <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-off-icon hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.93 10.93 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="model" data-i18n="modelLabel">模型</label>
          <div class="model-select-container">
            <select id="model-preset" class="model-preset">
              <option value="">自定义模型</option>
              <optgroup label="OpenAI">
                <option value="gpt-4o">GPT-4o (推荐)</option>
                <option value="gpt-4o-mini">GPT-4o Mini</option>
                <option value="gpt-4-turbo">GPT-4 Turbo</option>
                <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
              </optgroup>
              <optgroup label="DeepSeek">
                <option value="deepseek-chat">DeepSeek Chat</option>
                <option value="deepseek-coder">DeepSeek Coder</option>
              </optgroup>
              <optgroup label="本地模型">
                <option value="llama3.2">Llama 3.2 (Ollama)</option>
                <option value="codellama">Code Llama (Ollama)</option>
                <option value="mistral">Mistral (Ollama)</option>
              </optgroup>
              <optgroup label="其他">
                <option value="claude-3-opus">Claude 3 Opus</option>
                <option value="claude-3-sonnet">Claude 3 Sonnet</option>
              </optgroup>
            </select>
            <input type="text" id="model" data-i18n-placeholder="modelPlaceholder">
          </div>
          <p class="hint" data-i18n="modelSelectHint">选择预设模型或输入自定义模型名称</p>
        </div>
      </section>

      <!-- Advanced Settings -->
      <section class="settings-section">
        <h2 class="section-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
          <span data-i18n="advancedSettingsTitle">高级设置</span>
        </h2>
        <div class="form-group">
          <label for="max-iterations" data-i18n="maxIterationsLabel">最大迭代次数</label>
          <input type="number" id="max-iterations" value="10" min="1" max="50">
          <p class="hint" data-i18n="maxIterationsHint">智能体执行的最大步骤数 (1-50)</p>
        </div>
        <div class="form-group">
          <label for="timeout" data-i18n="timeoutLabel">API 超时时间 (秒)</label>
          <input type="number" id="timeout" value="60" min="10" max="300">
          <p class="hint" data-i18n="timeoutHint">API 请求超时时间 (10-300秒)</p>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="enable-cache" checked>
            <span class="checkbox-text" data-i18n="enableCacheLabel">启用智能缓存</span>
          </label>
          <p class="hint" data-i18n="enableCacheHint">缓存 API 响应和页面分析结果以提高性能</p>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="enable-recovery" checked>
            <span class="checkbox-text" data-i18n="enableRecoveryLabel">启用自动恢复</span>
          </label>
          <p class="hint" data-i18n="enableRecoveryHint">自动重试失败的 API 请求</p>
        </div>
      </section>

      <!-- Actions -->
      <div class="settings-actions">
        <button id="btn-save-settings" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          <span data-i18n="btnSaveSettings">保存设置</span>
        </button>
        <button id="btn-test-connection" class="btn btn-secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <span data-i18n="btnTestConnection">测试连接</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="../lib/i18n.js"></script>
  <script src="../lib/utils.js"></script>
  <script src="settings.js"></script>
</body>
</html>
