<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentab</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <div class="logo-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2">
              <defs>
                <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color: #6366f1" />
                  <stop offset="100%" style="stop-color: #8b5cf6" />
                </linearGradient>
              </defs>
              <path d="M12 2L2 7l10 5 10-5-10-5z" />
              <path d="M2 17l10 5 10-5" />
              <path d="M2 12l10 5 10-5" />
            </svg>
          </div>
          <h1>Agentab</h1>
        </div>
        <div class="header-right">
          <button id="btn-theme" class="icon-btn" data-i18n-title="btnTheme">
            <svg
              class="icon-sun"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="5" />
              <line x1="12" y1="1" x2="12" y2="3" />
              <line x1="12" y1="21" x2="12" y2="23" />
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
              <line x1="1" y1="12" x2="3" y2="12" />
              <line x1="21" y1="12" x2="23" y2="12" />
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
            <svg
              class="icon-moon hidden"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </button>
          <button id="btn-shortcuts" class="icon-btn" data-i18n-title="btnShortcuts">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h8M6 16h12" />
            </svg>
          </button>
          <button id="btn-history" class="icon-btn" data-i18n-title="btnHistory">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
          </button>
          <button id="btn-tasks" class="icon-btn" data-i18n-title="btnTasks">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
              />
              <path d="M9 14l2 2 4-4" />
            </svg>
          </button>
          <button id="btn-settings" class="icon-btn" data-i18n-title="btnSettings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"
              />
            </svg>
          </button>
        </div>
      </header>

      <!-- Tabs -->
      <nav class="tabs">
        <button class="tab active" data-tab="prompt">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
          </svg>
          <span data-i18n="tabPrompt">提示词</span>
        </button>
        <button class="tab" data-tab="code">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 18 22 12 16 6" />
            <polyline points="8 6 2 12 8 18" />
          </svg>
          <span data-i18n="tabCode">代码</span>
        </button>
      </nav>

      <!-- Prompt Tab -->
      <div id="tab-prompt" class="tab-content active">
        <div class="input-section">
          <textarea id="prompt-input" data-i18n-placeholder="promptPlaceholder" rows="8"></textarea>
          <div class="input-actions">
            <button id="btn-save-prompt" class="btn btn-secondary" data-i18n-title="btnSave">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
                <polyline points="17 21 17 13 7 13 7 21" />
                <polyline points="7 3 7 8 15 8" />
              </svg>
              <span data-i18n="btnSave">保存</span>
            </button>
            <button id="btn-stop-prompt" class="btn btn-danger hidden">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="6" y="6" width="12" height="12" />
              </svg>
              <span data-i18n="btnStop">停止</span>
            </button>
            <button id="btn-run-prompt" class="btn btn-primary">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="5 3 19 12 5 21 5 3" />
              </svg>
              <span data-i18n="btnRunAgent">运行智能体</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Code Tab -->
      <div id="tab-code" class="tab-content">
        <div class="input-section">
          <div class="editor-toolbar">
            <button id="btn-select-element" class="toolbar-btn" data-i18n-title="btnSelectElement">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z" />
                <path d="M13 13l6 6" />
              </svg>
              <span data-i18n="btnSelectElement">选择元素</span>
            </button>
          </div>
          <textarea
            id="code-input"
            data-i18n-placeholder="codePlaceholder"
            rows="12"
            spellcheck="false"
            class="code-textarea"
          ></textarea>
          <div class="input-actions">
            <button id="btn-save-code" class="btn btn-secondary" data-i18n-title="btnSave">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
                <polyline points="17 21 17 13 7 13 7 21" />
                <polyline points="7 3 7 8 15 8" />
              </svg>
              <span data-i18n="btnSave">保存</span>
            </button>
            <button id="btn-stop-code" class="btn btn-danger hidden">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="6" y="6" width="12" height="12" />
              </svg>
              <span data-i18n="btnStop">停止</span>
            </button>
            <button id="btn-run-code" class="btn btn-primary">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="5 3 19 12 5 21 5 3" />
              </svg>
              <span data-i18n="btnExecute">执行</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Progress Section -->
      <div id="progress-section" class="progress-section hidden">
        <div class="progress-header">
          <span class="progress-icon">🔄</span>
          <span class="progress-label" id="progress-label">准备中...</span>
          <span class="progress-percentage" id="progress-percentage">0%</span>
        </div>
        <div class="progress-bar-wrapper">
          <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
        <div class="progress-text">
          <span id="progress-step">Step 0/10</span>
          <span id="progress-time">0s</span>
        </div>
      </div>

      <!-- Output Section -->
      <div id="output-section" class="output-section hidden">
        <div class="output-header">
          <h3 data-i18n="outputTitle">输出</h3>
          <button id="btn-clear-output" class="icon-btn small" data-i18n-title="btnClear">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div id="output-content" class="output-content"></div>
      </div>

      <!-- Save Task Dialog -->
      <div id="save-dialog" class="dialog-overlay hidden">
        <div class="dialog">
          <div class="dialog-header">
            <h3 data-i18n="saveTaskTitle">保存任务</h3>
            <button class="icon-btn small" id="btn-close-save-dialog">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
              </svg>
            </button>
          </div>
          <div class="dialog-body">
            <div class="form-group">
              <label for="task-name" data-i18n="taskNameLabel">任务名称 *</label>
              <input type="text" id="task-name" data-i18n-placeholder="taskNamePlaceholder" />
            </div>
            <div class="form-group">
              <label for="task-description" data-i18n="taskDescLabel">描述（可选）</label>
              <input type="text" id="task-description" data-i18n-placeholder="taskDescPlaceholder" />
            </div>
            <div class="form-group">
              <label data-i18n="typeLabel">类型</label>
              <div class="task-type-badge" id="task-type-badge">提示词</div>
            </div>
            <div class="form-group">
              <label data-i18n="contentPreviewLabel">内容预览</label>
              <pre id="task-content-preview" class="content-preview"></pre>
            </div>
          </div>
          <div class="dialog-footer">
            <button class="btn btn-secondary" id="btn-cancel-save" data-i18n="btnCancel">取消</button>
            <button class="btn btn-primary" id="btn-confirm-save" data-i18n="btnSaveTask">保存任务</button>
          </div>
        </div>
      </div>
    </div>

    <script src="../lib/i18n.js"></script>
    <script src="../lib/utils.js"></script>
    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
