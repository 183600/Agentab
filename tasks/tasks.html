<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="tasksPageTitle">Agentab - 已保存任务</title>
    <link rel="stylesheet" href="tasks.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="page-header">
        <div class="header-content">
          <div class="header-left">
            <div>
              <h1 data-i18n="tasksTitle">已保存任务</h1>
              <p class="subtitle" data-i18n="tasksSubtitle">管理你的自动化任务</p>
            </div>
          </div>
          <div class="header-actions">
            <div class="search-box">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <path d="M21 21l-4.35-4.35" />
              </svg>
              <input type="text" id="search-input" data-i18n-placeholder="searchPlaceholder" />
            </div>
            <div class="filter-group">
              <button class="filter-btn active" data-filter="all" data-i18n="filterAll">全部</button>
              <button class="filter-btn" data-filter="prompt">
                <span class="dot prompt"></span> <span data-i18n="typePrompt">提示词</span>
              </button>
              <button class="filter-btn" data-filter="code">
                <span class="dot code"></span> <span data-i18n="typeCode">代码</span>
              </button>
            </div>
            <div class="action-buttons">
              <button class="btn btn-secondary" id="btn-import-tasks" title="导入任务">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                  <polyline points="17 8 12 3 7 8" />
                  <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
                <span data-i18n="btnImport">导入</span>
              </button>
              <button class="btn btn-secondary" id="btn-export-tasks" title="导出任务">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                  <polyline points="7 10 12 15 17 10" />
                  <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                <span data-i18n="btnExport">导出</span>
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat">
          <span class="stat-value" id="total-tasks">0</span>
          <span class="stat-label" data-i18n="totalTasks">总任务数</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="prompt-tasks">0</span>
          <span class="stat-label" data-i18n="promptTasks">提示词</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="code-tasks">0</span>
          <span class="stat-label" data-i18n="codeTasks">代码</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="total-executions">0</span>
          <span class="stat-label" data-i18n="totalExecutions">执行次数</span>
        </div>
      </div>

      <!-- Schedule Management Section -->
      <section class="schedule-section">
        <div class="section-header">
          <h2>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            <span data-i18n="schedulesTitle">任务调度</span>
          </h2>
          <button class="btn btn-secondary btn-sm" id="btn-add-schedule" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span data-i18n="btnAddSchedule">添加调度</span>
          </button>
        </div>
        <div class="schedule-stats">
          <span class="schedule-stat">
            <span class="stat-dot active"></span>
            <span data-i18n="activeSchedules">活动: </span><span id="active-schedules-count">0</span>
          </span>
          <span class="schedule-stat">
            <span class="stat-dot paused"></span>
            <span data-i18n="pausedSchedules">暂停: </span><span id="paused-schedules-count">0</span>
          </span>
        </div>
        <div id="schedules-list" class="schedules-list">
          <!-- Schedules will be rendered here -->
          <div class="schedules-empty" id="schedules-empty">
            <span data-i18n="noSchedules">暂无调度任务</span>
          </div>
        </div>
      </section>

      <!-- Tasks Grid -->
      <div id="tasks-grid" class="tasks-grid">
        <!-- Tasks will be rendered here -->
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon">📋</div>
        <h3 data-i18n="noTasks">暂无任务</h3>
        <p data-i18n="noTasksHint">从扩展弹窗保存任务后，会在这里显示。</p>
      </div>

      <!-- No Results -->
      <div id="no-results" class="empty-state hidden">
        <div class="empty-icon">🔍</div>
        <h3 data-i18n="noResults">未找到结果</h3>
        <p data-i18n="noResultsHint">请尝试其他搜索词或筛选条件。</p>
      </div>
    </div>

    <!-- Edit Task Modal -->
    <div
      id="edit-modal"
      class="modal-overlay hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="edit-modal-title"
    >
      <div class="modal">
        <div class="modal-header">
          <h2 id="edit-modal-title" data-i18n="editTask">编辑任务</h2>
          <button class="close-btn" id="btn-close-modal" aria-label="Close dialog">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="edit-task-id" />
          <div class="form-group">
            <label for="edit-name" data-i18n="taskName">任务名称</label>
            <input type="text" id="edit-name" data-i18n-placeholder="taskNamePlaceholder" />
          </div>
          <div class="form-group">
            <label for="edit-description" data-i18n="description">描述</label>
            <input type="text" id="edit-description" data-i18n-placeholder="taskDescPlaceholder" />
          </div>
          <div class="form-group">
            <label data-i18n="typeLabel">类型</label>
            <div class="type-selector">
              <button class="type-option active" data-type="prompt" id="type-prompt">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
                </svg>
                <span data-i18n="typePrompt">提示词</span>
              </button>
              <button class="type-option" data-type="code" id="type-code">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="16 18 22 12 16 6" />
                  <polyline points="8 6 2 12 8 18" />
                </svg>
                <span data-i18n="typeCode">代码</span>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="edit-content" data-i18n="content">内容</label>
            <textarea id="edit-content" rows="10" data-i18n-placeholder="contentPlaceholder"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="btn-cancel-edit" data-i18n="btnCancel">取消</button>
          <button class="btn btn-primary" id="btn-save-edit" data-i18n="btnSaveChanges">保存更改</button>
        </div>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div
      id="delete-modal"
      class="modal-overlay hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="delete-modal-title"
    >
      <div class="modal small">
        <div class="modal-header">
          <h2 id="delete-modal-title" data-i18n="deleteTask">删除任务</h2>
        </div>
        <div class="modal-body">
          <p id="delete-confirm-text"></p>
          <p class="text-muted" data-i18n="cannotUndo">此操作无法撤销。</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="btn-cancel-delete" data-i18n="btnCancel">取消</button>
          <button class="btn btn-danger" id="btn-confirm-delete" data-i18n="btnDelete">删除</button>
        </div>
      </div>
    </div>

    <!-- Schedule Modal -->
    <div
      id="schedule-modal"
      class="modal-overlay hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="schedule-modal-title"
    >
      <div class="modal">
        <div class="modal-header">
          <h2 id="schedule-modal-title" data-i18n="createSchedule">创建调度</h2>
          <button class="close-btn" id="btn-close-schedule-modal" aria-label="Close dialog">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="schedule-task-id" />
          <input type="hidden" id="schedule-edit-id" />
          <div class="form-group">
            <label for="schedule-task-select" data-i18n="selectTask">选择任务</label>
            <select id="schedule-task-select">
              <option value="">-- 选择任务 --</option>
            </select>
          </div>
          <div class="form-group">
            <label data-i18n="scheduleType">调度类型</label>
            <div class="schedule-type-selector">
              <button class="type-option active" data-schedule-type="interval">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
                  <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 12M1 12l4.64 4.36A9 9 0 0 0 20.49 15"/>
                </svg>
                <span data-i18n="intervalSchedule">间隔执行</span>
              </button>
              <button class="type-option" data-schedule-type="daily">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                  <line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                <span data-i18n="dailySchedule">每日定时</span>
              </button>
              <button class="type-option" data-schedule-type="weekly">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                  <line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                <span data-i18n="weeklySchedule">每周定时</span>
              </button>
            </div>
          </div>
          <div class="form-group" id="schedule-interval-group">
            <label for="schedule-interval" data-i18n="intervalMinutes">间隔时间 (分钟)</label>
            <select id="schedule-interval">
              <option value="1">1 分钟</option>
              <option value="5">5 分钟</option>
              <option value="15" selected>15 分钟</option>
              <option value="30">30 分钟</option>
              <option value="60">1 小时</option>
              <option value="360">6 小时</option>
              <option value="720">12 小时</option>
              <option value="1440">24 小时</option>
            </select>
          </div>
          <div class="form-group hidden" id="schedule-time-group">
            <label for="schedule-time" data-i18n="scheduleTime">执行时间</label>
            <input type="time" id="schedule-time" value="09:00" />
          </div>
          <div class="form-group hidden" id="schedule-days-group">
            <label data-i18n="scheduleDays">执行日期</label>
            <div class="days-selector">
              <label class="day-option"><input type="checkbox" value="0" /><span>日</span></label>
              <label class="day-option"><input type="checkbox" value="1" checked /><span>一</span></label>
              <label class="day-option"><input type="checkbox" value="2" checked /><span>二</span></label>
              <label class="day-option"><input type="checkbox" value="3" checked /><span>三</span></label>
              <label class="day-option"><input type="checkbox" value="4" checked /><span>四</span></label>
              <label class="day-option"><input type="checkbox" value="5" checked /><span>五</span></label>
              <label class="day-option"><input type="checkbox" value="6" /><span>六</span></label>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="btn-cancel-schedule" data-i18n="btnCancel">取消</button>
          <button class="btn btn-primary" id="btn-save-schedule" data-i18n="btnCreateSchedule">创建调度</button>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Hidden file input for import -->
    <input type="file" id="import-file-input" accept=".json" style="display: none" />

    <script src="../lib/i18n.js"></script>
    <script src="../lib/utils.js"></script>
    <script src="tasks.js"></script>
  </body>
</html>
